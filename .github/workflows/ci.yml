name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Code Formatting (Ruff)
        run: ruff format --check .

      - name: Linting (Ruff)
        run: ruff check .

      - name: Type Checking (mypy)
        run: mypy .

      - name: Security Scan (Bandit)
        run: |
          pip install bandit
          bandit -r . -ll -ii -x ./venv,.venv,tests

  test:
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          # Normally we would start docker-compose services here if integration testing,
          # but for unit testing, we just run pytest.
          pytest tests/ --cov=./ --cov-report=xml
