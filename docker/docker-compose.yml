services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  spark-master:
    image: bitnami/spark:3.5.3
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"

  spark-worker:
    image: bitnami/spark:3.5.3
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - localstack
      - kafka
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - DPA__S3__ENDPOINT_URL=http://localstack:4566
      - DPA__KAFKA__BOOTSTRAP_SERVERS=kafka:9092
      - DPA__SOURCES__REST_API_URL=http://api:8000/source/transactions?count=200
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ../storage/local:/opt/data-pipeline-ai/storage/local

  kafka-producer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - kafka
    environment:
      - LOG_LEVEL=INFO
      - DPA__KAFKA__BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=transactions
      - PRODUCER_RATE_PER_SEC=5
    command: ["python", "-m", "ingestion.kafka_producer"]

  kafka-consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - kafka
      - localstack
    environment:
      - LOG_LEVEL=INFO
      - DPA__S3__ENDPOINT_URL=http://localstack:4566
      - DPA__KAFKA__BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=transactions
      - KAFKA_GROUP_ID=dpa-consumer
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ../storage/local:/opt/data-pipeline-ai/storage/local
    command: ["python", "-m", "ingestion.kafka_consumer"]

  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg:/var/lib/postgresql/data

  airflow-init:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      - airflow-postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
      _AIRFLOW_WWW_USER_FIRSTNAME: Data
      _AIRFLOW_WWW_USER_LASTNAME: Platform
      _AIRFLOW_WWW_USER_EMAIL: airflow@example.com
    volumes:
      - ..:/opt/data-pipeline-ai
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname "$${_AIRFLOW_WWW_USER_FIRSTNAME}" \
          --lastname "$${_AIRFLOW_WWW_USER_LASTNAME}" \
          --role Admin \
          --email "$${_AIRFLOW_WWW_USER_EMAIL}" || true

  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      - airflow-init
      - airflow-postgres
      - localstack
      - api
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/data-pipeline-ai/orchestration
      # Local demo: run Spark inside Airflow container (no dependency on Spark cluster wiring)
      DPA__SPARK__MASTER_URL: local[*]
      DPA__S3__ENDPOINT_URL: http://localstack:4566
      DPA__SOURCES__REST_API_URL: http://api:8000/source/transactions?count=200
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ..:/opt/data-pipeline-ai
      - airflow_logs:/opt/airflow/logs
      - ../storage/local:/opt/data-pipeline-ai/storage/local
    command: webserver

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      - airflow-init
      - airflow-postgres
      - localstack
      - api
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/data-pipeline-ai/orchestration
      DPA__SPARK__MASTER_URL: local[*]
      DPA__S3__ENDPOINT_URL: http://localstack:4566
      DPA__SOURCES__REST_API_URL: http://api:8000/source/transactions?count=200
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ..:/opt/data-pipeline-ai
      - airflow_logs:/opt/airflow/logs
      - ../storage/local:/opt/data-pipeline-ai/storage/local
    command: scheduler

volumes:
  localstack_data:
  airflow_pg:
  airflow_logs:
